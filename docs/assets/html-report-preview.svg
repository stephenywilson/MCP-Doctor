<line x1="450" y1="188" x2="830" y2="188" stroke="#21262d" stroke-width="1"/>

<!-- Fix item 3 -->
<rect x="450" y="195" width="18" height="18" rx="9" class="s3"/>
<rect x="450" y="195" width="18" height="18" rx="9" class="b1"/>
<text x="459" y="208" text-anchor="middle" class="sans t4" font-size="10" font-weight="600">3</text>
<text x="476" y="206" class="sans t1 med" font-size="12">Filesystem server has overly broad access</text>
<text x="476" y="220" class="sans t3" font-size="11">Scope to project directory, not /Users or /</text>

