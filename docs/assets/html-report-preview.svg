<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 500" width="780" height="500">
  <defs>
    <style>
      .bg       { fill: #0d1117; }
      .surface  { fill: #161b22; }
      .surface2 { fill: #1c2128; }
      .border   { stroke: #30363d; stroke-width: 1; fill: none; }
      .text     { font-family: -apple-system, 'Segoe UI', sans-serif; fill: #c9d1d9; }
      .muted    { fill: #8b949e; }
      .accent   { fill: #58a6ff; }
      .mono     { font-family: 'SF Mono', 'Cascadia Code', monospace; }
      .green    { fill: #3fb950; }
      .red      { fill: #f85149; }
      .yellow   { fill: #d29922; }
      .blue     { fill: #388bfd; }
      .white    { fill: #e6edf3; }
    </style>
  </defs>

  <!-- Browser chrome -->
  <rect width="780" height="500" rx="10" class="surface"/>
  <rect width="780" height="38" rx="10" class="surface2"/>
  <rect y="28" width="780" height="10" class="surface2"/>
  <line x1="0" y1="38" x2="780" y2="38" stroke="#30363d" stroke-width="1"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="19" r="5.5" fill="#f85149"/>
  <circle cx="38" cy="19" r="5.5" fill="#d29922"/>
  <circle cx="56" cy="19" r="5.5" fill="#3fb950"/>

  <!-- URL bar -->
  <rect x="120" y="9" width="400" height="20" rx="4" fill="#21262d"/>
  <text x="320" y="23" text-anchor="middle" class="text muted mono" font-size="11">mcp-doctor-report.html</text>

  <!-- Page background -->
  <rect y="38" width="780" height="462" class="bg"/>

  <!-- Header bar -->
  <rect y="38" width="780" height="50" class="surface"/>
  <line x1="0" y1="88" x2="780" y2="88" stroke="#30363d" stroke-width="1"/>
  <text x="24" y="70" class="text white" font-size="20" font-weight="700">MCP <tspan class="accent">Doctor</tspan></text>
  <rect x="130" y="58" width="42" height="18" rx="9" fill="#21262d"/>
  <text x="151" y="71" text-anchor="middle" class="text muted" font-size="10">v0.1.0</text>
  <text x="720" y="70" class="text muted" font-size="11">2026-05-04 12:00 UTC</text>

  <!-- Score card -->
  <rect x="16" y="100" width="748" height="118" rx="6" class="surface"/>
  <rect x="16" y="100" width="748" height="118" rx="6" class="border"/>

  <!-- Score ring -->
  <circle cx="75" cy="159" r="40" fill="none" stroke="#21262d" stroke-width="8"/>
  <circle cx="75" cy="159" r="40" fill="none" stroke="#f85149" stroke-width="8"
    stroke-dasharray="251.2" stroke-dashoffset="240" stroke-linecap="round"
    transform="rotate(-90 75 159)"/>
  <text x="75" y="155" text-anchor="middle" class="text white" font-size="18" font-weight="700">4</text>
  <text x="75" y="169" text-anchor="middle" class="text muted" font-size="9">/ 100</text>
  <text x="75" y="207" text-anchor="middle" class="text muted" font-size="10">Health Score</text>

  <!-- Status -->
  <text x="140" y="145" class="text red" font-size="22" font-weight="700">BROKEN</text>
  <text x="140" y="163" class="text muted" font-size="12">Critical issues detected. Fix HIGH severity findings first.</text>
  <text x="140" y="180" class="text muted" font-size="11">1 config scanned  ·  3 servers found  ·  6 findings</text>

  <!-- Stat cards -->
  <rect x="552" y="112" width="64" height="56" rx="5" class="surface2"/>
  <rect x="552" y="112" width="64" height="56" rx="5" class="border"/>
  <text x="584" y="140" text-anchor="middle" class="text red" font-size="24" font-weight="700">4</text>
  <text x="584" y="156" text-anchor="middle" class="text muted" font-size="9">HIGH</text>

  <rect x="624" y="112" width="64" height="56" rx="5" class="surface2"/>
  <rect x="624" y="112" width="64" height="56" rx="5" class="border"/>
  <text x="656" y="140" text-anchor="middle" class="text yellow" font-size="24" font-weight="700">2</text>
  <text x="656" y="156" text-anchor="middle" class="text muted" font-size="9">MEDIUM</text>

  <rect x="696" y="112" width="64" height="56" rx="5" class="surface2"/>
  <rect x="696" y="112" width="64" height="56" rx="5" class="border"/>
  <text x="728" y="140" text-anchor="middle" class="text blue" font-size="24" font-weight="700">0</text>
  <text x="728" y="156" text-anchor="middle" class="text muted" font-size="9">LOW</text>

  <!-- Section: Findings -->
  <text x="16" y="244" class="text white" font-size="14" font-weight="600">Findings</text>
  <line x1="16" y1="250" x2="764" y2="250" stroke="#30363d" stroke-width="1"/>

  <!-- HIGH group label -->
  <text x="16" y="272" class="text red" font-size="12" font-weight="600">🔴 HIGH — 4 findings</text>

  <!-- Finding card 1 -->
  <rect x="16" y="280" width="748" height="46" rx="5" class="surface"/>
  <rect x="16" y="280" width="748" height="46" rx="5" class="border"/>
  <rect x="16" y="280" width="3" height="46" rx="1" fill="#f85149"/>
  <rect x="28" y="290" width="32" height="16" rx="8" fill="#3a1111"/>
  <text x="44" y="302" text-anchor="middle" class="text red" font-size="9" font-weight="700">HIGH</text>
  <text x="70" y="298" class="text white" font-size="12" font-weight="500">Server missing required "command" field</text>
  <rect x="570" y="290" width="80" height="15" rx="7" fill="#21262d"/>
  <text x="610" y="301" text-anchor="middle" class="text muted" font-size="9">CFG-004</text>
  <rect x="658" y="290" width="96" height="15" rx="7" fill="#21262d"/>
  <text x="706" y="301" text-anchor="middle" class="text muted" font-size="9">TOOL_VISIBILITY</text>
  <text x="28" y="318" class="text muted" font-size="11">Evidence: Server "broken-no-command": command = undefined</text>

  <!-- Finding card 2 -->
  <rect x="16" y="332" width="748" height="46" rx="5" class="surface"/>
  <rect x="16" y="332" width="748" height="46" rx="5" class="border"/>
  <rect x="16" y="332" width="3" height="46" rx="1" fill="#f85149"/>
  <rect x="28" y="342" width="32" height="16" rx="8" fill="#3a1111"/>
  <text x="44" y="354" text-anchor="middle" class="text red" font-size="9" font-weight="700">HIGH</text>
  <text x="70" y="350" class="text white" font-size="12" font-weight="500">Placeholder value detected: GITHUB_TOKEN</text>
  <rect x="570" y="342" width="56" height="15" rx="7" fill="#21262d"/>
  <text x="598" y="353" text-anchor="middle" class="text muted" font-size="9">github</text>
  <text x="28" y="370" class="text muted" font-size="11">Evidence: GITHUB_TOKEN = "YOUR_****"   Fix: Replace the placeholder with your real GITHUB_TOKEN value.</text>

  <!-- MEDIUM group label -->
  <text x="16" y="400" class="text yellow" font-size="12" font-weight="600">🟡 MEDIUM — 2 findings</text>

  <!-- Finding card 3 -->
  <rect x="16" y="408" width="748" height="38" rx="5" class="surface"/>
  <rect x="16" y="408" width="748" height="38" rx="5" class="border"/>
  <rect x="16" y="408" width="3" height="38" rx="1" fill="#d29922"/>
  <rect x="28" y="417" width="44" height="16" rx="8" fill="#2d2107"/>
  <text x="50" y="429" text-anchor="middle" class="text yellow" font-size="9" font-weight="700">MEDIUM</text>
  <text x="82" y="430" class="text white" font-size="12" font-weight="500">GUI app PATH may not include your shell PATH</text>
  <rect x="570" y="418" width="72" height="15" rx="7" fill="#21262d"/>
  <text x="606" y="429" text-anchor="middle" class="text muted" font-size="9">filesystem</text>
  <text x="650" y="418" width="96" height="15" rx="7" fill="#21262d"/>
  <text x="720" y="429" text-anchor="middle" class="text muted" font-size="9">GUI_PATH</text>

  <!-- Footer -->
  <line x1="0" y1="468" x2="780" y2="468" stroke="#30363d" stroke-width="1"/>
  <text x="16" y="486" class="text muted" font-size="11">MCP Doctor v0.1.0 — github.com/stephenywilson/MCP-Doctor</text>
  <text x="620" y="486" class="text muted" font-size="11">⚠️ Secrets masked. No network.</text>
</svg>
