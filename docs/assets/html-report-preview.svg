<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" width="860" height="560">
<defs>
  <style>
    .bg      { fill: #0d1117; }
    .s1      { fill: #161b22; }
    .s2      { fill: #1c2128; }
    .s3      { fill: #21262d; }
    .b1      { stroke: #30363d; stroke-width: 1; fill: none; }
    .b2      { stroke: #21262d; stroke-width: 1; fill: none; }
    .t1      { fill: #e6edf3; }
    .t2      { fill: #c9d1d9; }
    .t3      { fill: #8b949e; }
    .t4      { fill: #484f58; }
    .red     { fill: #f85149; }
    .amber   { fill: #d29922; }
    .blue    { fill: #388bfd; }
    .green   { fill: #3fb950; }
    .cyan    { fill: #79c0ff; }
    .mono    { font-family: 'SF Mono', 'Cascadia Code', monospace; }
    .sans    { font-family: -apple-system, 'Segoe UI', sans-serif; }
    .bold    { font-weight: 700; }
    .med     { font-weight: 500; }
    .upper   { text-transform: uppercase; }
  </style>
</defs>

<!-- Page background -->
<rect width="860" height="560" class="bg"/>

<!-- ── HEADER ── -->
<text x="24" y="42" class="sans bold t1" font-size="17">MCP Doctor</text>
<text x="24" y="59" class="sans t3" font-size="12">Diagnose and fix broken MCP servers.</text>

<rect x="790" y="26" width="42" height="16" rx="8" class="s3"/>
<rect x="790" y="26" width="42" height="16" rx="8" class="b1"/>
<text x="811" y="38" text-anchor="middle" class="mono t3" font-size="10">v0.1.0</text>
<text x="790" y="58" text-anchor="end" class="mono t3" font-size="10">2026-05-04 12:00 UTC</text>

<line x1="24" y1="70" x2="836" y2="70" stroke="#30363d" stroke-width="1"/>

<!-- ── HERO ── -->
<rect x="24" y="82" width="812" height="158" rx="7" class="s1"/>
<rect x="24" y="82" width="812" height="158" rx="7" class="b1"/>

