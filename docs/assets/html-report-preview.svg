<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" width="880" height="560">
<defs>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.022)" stroke-width="1"/>
  </pattern>
  <style>
    text { font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; }
    .mono { font-family: 'SF Mono', 'Cascadia Code', monospace; }
    .lbl  { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.14em; fill: #4c5e72; }
  </style>
</defs>

<!-- Page background + grid -->
<rect width="880" height="560" fill="#07090e"/>
<rect width="880" height="560" fill="url(#grid)"/>

<!-- ── MODULE HEADER ── -->
<text x="24" y="38" class="lbl" fill="#3cc49a" letter-spacing="0.18em">Catalayer · Diagnostic Module</text>
<text x="24" y="62" font-size="20" font-weight="700" fill="#e4ecf5" letter-spacing="-0.04em">MCP Doctor</text>
<text x="24" y="78" font-size="12" fill="#4c5e72">Diagnose and fix broken MCP servers.</text>

<!-- version badge -->
<rect x="820" y="36" width="38" height="18" rx="3" fill="#0c1219" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
<text x="839" y="49" text-anchor="middle" class="lbl" font-size="9.5">v0.1.0</text>
<!-- timestamp -->
<text x="858" y="72" text-anchor="end" class="mono" font-size="11" fill="#4c5e72">2026-05-04 12:00 UTC</text>

<!-- header divider -->
<line x1="24" y1="92" x2="856" y2="92" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

<!-- ── HERO PANEL ── -->
<rect x="24" y="104" width="832" height="160" rx="4" fill="#0c1219" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

<!-- Hero left (status/score) -->
<!-- vertical divider -->
<line x1="440" y1="108" x2="440" y2="260" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

<!-- Status badge -->
<text x="48" y="140" font-size="26" font-weight="700" fill="#e84545" letter-spacing="-0.04em">BROKEN</text>

<!-- Score number -->
<text x="48" y="196" font-size="54" font-weight="700" fill="#e84545" letter-spacing="-0.04em">4</text>
<text x="90" y="196" font-size="18" fill="#4c5e72">/&thinsp;100</text>

<!-- Score bar -->
<rect x="48" y="204" width="348" height="2" rx="1" fill="rgba(255,255,255,0.08)"/>
<rect x="48" y="204" width="14" height="2" rx="1" fill="#e84545"/>

<!-- Status desc -->
<text x="48" y="228" font-size="12" fill="#4c5e72">Critical issues detected. Fix HIGH findings first.</text>

<!-- Hero right (top fixes) -->
<rect x="440" y="104" width="416" height="160" rx="0" fill="#101820"/>
<!-- round right corners -->
<rect x="844" y="104" width="12" height="160" fill="#101820"/>

<text x="464" y="130" class="lbl">What to fix first</text>

<!-- Fix 1 -->
<rect x="464" y="140" width="18" height="18" rx="3" fill="#10221e" stroke="#1b2d28" stroke-width="1"/>
<text x="473" y="153" text-anchor="middle" class="mono" font-size="10" font-weight="700" fill="#3cc49a">1</text>
<text x="490" y="152" font-size="13" font-weight="500" fill="#e4ecf5">Server missing &quot;command&quot; field</text>
<rect x="738" y="141" width="118" height="14" rx="2" fill="#141d28" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
<text x="797" y="152" text-anchor="middle" class="mono" font-size="9" fill="#2e3d4f">broken-no-command</text>
<text x="490" y="166" font-size="11" fill="#4c5e72">Add a &quot;command&quot; field to server config</text>
<line x1="464" y1="176" x2="848" y2="176" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

<!-- Fix 2 -->
<rect x="464" y="183" width="18" height="18" rx="3" fill="#10221e" stroke="#1b2d28" stroke-width="1"/>
<text x="473" y="196" text-anchor="middle" class="mono" font-size="10" font-weight="700" fill="#3cc49a">2</text>
<text x="490" y="195" font-size="13" font-weight="500" fill="#e4ecf5">Placeholder detected: GITHUB_TOKEN</text>
<rect x="464" y="206" width="384" height="14" rx="2" fill="#141d28" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
<text x="472" y="217" class="mono" font-size="10" fill="#4c5e72">Replace with your real token value</text>
<line x1="464" y1="224" x2="848" y2="224" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

<!-- Fix 3 -->
<rect x="464" y="231" width="18" height="18" rx="3" fill="#10221e" stroke="#1b2d28" stroke-width="1"/>
<text x="473" y="244" text-anchor="middle" class="mono" font-size="10" font-weight="700" fill="#3cc49a">3</text>
<text x="490" y="243" font-size="13" font-weight="500" fill="#e4ecf5">Filesystem server has overly broad access</text>
<text x="490" y="257" font-size="11" fill="#4c5e72">Scope to project directory, not / or /Users</text>

<!-- ── STATS STRIP ── -->
<rect x="24" y="274" width="832" height="52" rx="4" fill="#0c1219" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

<!-- Stat: configs -->
<text x="107" y="299" text-anchor="middle" font-size="22" font-weight="700" fill="#e4ecf5" letter-spacing="-0.03em">1</text>
<text x="107" y="314" text-anchor="middle" class="lbl" font-size="9">configs</text>
<line x1="197" y1="287" x2="197" y2="315" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

<!-- Stat: servers -->
<text x="272" y="299" text-anchor="middle" font-size="22" font-weight="700" fill="#e4ecf5" letter-spacing="-0.03em">3</text>
<text x="272" y="314" text-anchor="middle" class="lbl" font-size="9">servers</text>
<line x1="353" y1="287" x2="353" y2="315" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

<!-- Stat: HIGH -->
<text x="440" y="299" text-anchor="middle" font-size="22" font-weight="700" fill="#e84545" letter-spacing="-0.03em">4</text>
<text x="440" y="314" text-anchor="middle" class="lbl" font-size="9">high</text>
<line x1="525" y1="287" x2="525" y2="315" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

<!-- Stat: MEDIUM -->
<text x="608" y="299" text-anchor="middle" font-size="22" font-weight="700" fill="#d4940a" letter-spacing="-0.03em">2</text>
<text x="608" y="314" text-anchor="middle" class="lbl" font-size="9">medium</text>
<line x1="694" y1="287" x2="694" y2="315" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

<!-- Stat: LOW -->
<text x="772" y="299" text-anchor="middle" font-size="22" font-weight="700" fill="#4a9eff" letter-spacing="-0.03em">0</text>
<text x="772" y="314" text-anchor="middle" class="lbl" font-size="9">low</text>

<!-- ── FINDINGS ── -->
<text x="24" y="360" class="lbl">Findings</text>
<line x1="24" y1="368" x2="856" y2="368" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

<text x="24" y="386" class="lbl" fill="#e84545">HIGH — 4 findings</text>

<!-- Finding card 1 -->
<rect x="24" y="393" width="832" height="58" rx="0" fill="#0c1219" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
<rect x="26" y="393" width="830" height="58" rx="4" fill="#0c1219"/>
<!-- strip rounded corners on left -->
<rect x="24" y="393" width="3" height="58" fill="#e84545"/>

<text x="38" y="411" class="mono lbl" font-size="9" fill="#e84545">HIGH</text>
<text x="80" y="411" font-size="13.5" font-weight="500" fill="#e4ecf5" letter-spacing="-0.01em">Server missing required &quot;command&quot; field</text>

<!-- Evidence block -->
<rect x="38" y="417" width="806" height="22" rx="2" fill="#141d28" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
<text x="46" y="432" class="mono" font-size="11" fill="#8896a8">Evidence  Server "broken-no-command": command = undefined</text>

<!-- Chips -->
<rect x="38" y="442" width="52" height="14" rx="2" fill="#141d28" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
<text x="64" y="453" text-anchor="middle" class="mono" font-size="8.5" fill="#2e3d4f">CFG-004</text>
<rect x="96" y="442" width="80" height="14" rx="2" fill="#141d28" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
<text x="136" y="453" text-anchor="middle" class="mono" font-size="8.5" fill="#2e3d4f">TOOL_VISIBILITY</text>

<!-- Finding card 2 -->
<rect x="24" y="457" width="832" height="44" rx="0" fill="#0c1219" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
<rect x="26" y="457" width="830" height="44" rx="4" fill="#0c1219"/>
<rect x="24" y="457" width="3" height="44" fill="#e84545"/>

<text x="38" y="474" class="mono lbl" font-size="9" fill="#e84545">HIGH</text>
<text x="80" y="474" font-size="13.5" font-weight="500" fill="#e4ecf5">Placeholder value detected: GITHUB_TOKEN</text>
<rect x="38" y="481" width="806" height="14" rx="2" fill="#0d1e1b" stroke="#1b2d28" stroke-width="1"/>
<text x="46" y="492" class="mono" font-size="11" fill="#3cc49a">Suggested fix  Replace with your real GITHUB_TOKEN value</text>

<!-- MEDIUM group -->
<text x="24" y="518" class="lbl" fill="#d4940a">MEDIUM — 2 findings</text>

<!-- Medium card -->
<rect x="24" y="525" width="832" height="26" rx="0" fill="#0c1219" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
<rect x="26" y="525" width="830" height="26" rx="4" fill="#0c1219"/>
<rect x="24" y="525" width="3" height="26" fill="#d4940a"/>
<text x="38" y="543" class="mono lbl" font-size="9" fill="#d4940a">MEDIUM</text>
<text x="90" y="543" font-size="13.5" font-weight="500" fill="#e4ecf5">GUI app PATH may not include your shell PATH</text>

<!-- ── FOOTER ── -->
<line x1="24" y1="553" x2="856" y2="553" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
<text x="24" y="548" class="mono" font-size="11" fill="#4c5e72"><tspan font-weight="600" fill="#3cc49a">MCP Doctor</tspan> — github.com/stephenywilson/MCP-Doctor</text>
<text x="856" y="548" text-anchor="end" class="mono" font-size="11" fill="#4c5e72">Secrets masked · No network access</text>
</svg>
